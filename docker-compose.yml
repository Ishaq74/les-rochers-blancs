services:
  # ============================================
  # 1. MIGRATION DRIZZLE (une seule fois)
  # ============================================
  migrate:
    build:
      context: .
      target: migrate
    command: sh -c "pnpm db:wait && pnpm db:baseline && pnpm db:migrate"
    env_file: .env
    restart: "no"
    profiles: ["migrate"]
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # 2. APPLICATION ASTRO (principale)
  # ============================================
  app:
    build:
      context: .
      target: runtime
    container_name: astro-app
    expose:
      - "4321"
    env_file: .env
    volumes:
      - uploads_data:/app/storage/uploads
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # 3. PROXY CADDY (HTTP + HTTPS + certificats persistants)
  # ============================================
  proxy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # 4. BASE DE DONNÉES POSTGRESQL 17
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=rochers_blancs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rochers_blancs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================
  # 5. BACKUP AUTOMATIQUE DE LA DB (tous les jours)
  # ============================================
  backup:
    image: postgres:17-alpine
    container_name: db-backup
    volumes:
      - pgdata:/var/lib/postgresql/data:ro
      - ./backups:/backups
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=rochers_blancs
    command: >
      sh -c "
        mkdir -p /backups &&
        pg_dump -U postgres -d rochers_blancs | gzip > /backups/backup_$(date +%Y%m%d_%H%M%S).sql.gz &&
        find /backups -name 'backup_*.sql.gz' -mtime +30 -delete
      "
    restart: "no"
    profiles: ["backup"]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
  uploads_data:
  caddy_data:
  caddy_config:
  app_logs: