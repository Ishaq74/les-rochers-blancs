services:
  # ============================================
  # 1. MIGRATION DRIZZLE (one-shot)
  # ============================================
  migrate:
      build:
        context: .
        target: migrate
      command: sh -c "pnpm db:wait && pnpm db:baseline && pnpm db:migrate && pnpm seed:admin"
      env_file: .env
      environment:
        - ADMIN_PASSWORD=Admin123!Secure2026
      volumes:
        - ./.env:/app/.env:ro
      restart: "no"
      profiles: ["migrate"]
      depends_on:
        db:
          condition: service_healthy

# ============================================
  # 2. APPLICATION ASTRO
  # ============================================
  app:
    build:
      context: .
      target: runtime
    container_name: astro-app
    expose:
      - "4321"
    env_file: .env
    volumes:
      - uploads_data:/app/storage/uploads
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q --max-redirect=5 http://localhost:4321/fr || true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================
  # 3. PROXY CADDY
  # ============================================
  proxy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # 4. POSTGRESQL 17
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rochers_blancs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rochers_blancs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ============================================
  # 5. BACKUP (one-shot)
  # ============================================
  backup:
    image: alpine:latest
    container_name: db-backup
    env_file: .env
    environment:
      - PGHOST=db
      - PGUSER=postgres
      - PGDATABASE=rochers_blancs
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        apk add --no-cache postgresql-client &&
        mkdir -p /backups &&
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h db -U postgres -d rochers_blancs | gzip > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql.gz &&
        find /backups -name 'backup_*.sql.gz' -mtime +30 -delete
      "
    profiles: ["backup"]
    restart: "no"

volumes:
  pgdata:
  uploads_data:
  caddy_data:
  caddy_config:
  app_logs: