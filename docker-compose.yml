services:
  # Migration Drizzle
  migrate:
    build:
      context: .
      target: migrate
    command: sh -c "pnpm db:wait && pnpm db:baseline && pnpm db:migrate"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DB_WAIT_MAX_ATTEMPTS=${DB_WAIT_MAX_ATTEMPTS:-30}
      - DB_WAIT_DELAY_MS=${DB_WAIT_DELAY_MS:-2000}
    restart: "no"

  # Application principale
  app:
    build:
      context: .
      target: runtime
    container_name: astro-app
    expose:
      - "4321"
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=http://${APP_DOMAIN}
      - UPLOADS_DIR=/app/storage/uploads
    volumes:
      - uploads_data:/app/storage/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Proxy Caddy
  proxy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # Base de données
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=rochers_blancs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rochers_blancs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
  caddy_data:
  caddy_config: