services:
  # ============================================
  # 1. MIGRATION DRIZZLE (une seule fois, pas à chaque démarrage)
  # ============================================
  migrate:
    build:
      context: .
      target: migrate
    command: sh -c "pnpm db:wait && pnpm db:baseline && pnpm db:migrate"
    env_file: .env
    restart: "no"
    profiles: ["migrate"]                    # ← Ne se lance JAMAIS automatiquement
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # 2. APPLICATION ASTRO (principale)
  # ============================================
  app:
    build:
      context: .
      target: runtime
    container_name: astro-app
    expose:
      - "4321"
    env_file: .env
    volumes:
      - uploads_data:/app/storage/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: unless-stopped
    # Healthcheck défini dans le Dockerfile (ne pas dupliquer ici)
    # Le HEALTHCHECK du Dockerfile est déjà parfait

  # ============================================
  # 3. PROXY CADDY (HTTP + HTTPS automatique)
  # ============================================
  proxy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # 4. BASE DE DONNÉES POSTGRESQL 17
  # ============================================
  db:
    image: postgres:17-alpine
    container_name: postgres-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=rochers_blancs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rochers_blancs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
  caddy_data:
  caddy_config: